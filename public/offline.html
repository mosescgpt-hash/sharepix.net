<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#123851" />
    <title>Offline — sharepix.net</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; background: #f4f6f5; color: #123851; font-family: system-ui, sans-serif; text-align: center; }
      main { max-width: 440px; }
      img { width: 96px; height: 96px; border-radius: 22px; }
      h1 { margin: 20px 0 8px; }
      p { line-height: 1.5; color: #456173; }
      button { margin-top: 12px; border: 0; border-radius: 999px; padding: 12px 22px; background: #123851; color: white; font: inherit; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/app-icon-192.png" alt="" />
      <h1>You’re offline</h1>
      <p>Reconnect to upload or view event photos. Your selected files stay on your device until you try again.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
